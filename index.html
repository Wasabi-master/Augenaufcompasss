<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Augen Auf Compass</title>
</head>

<body style="margin:0; background:#030712; color:white; font-family: Arial, sans-serif;">

<div id="app" style="padding:20px">Lade...</div>

<script>
let userPos = null;
let heading = 0;
let solution = "";

const points = [
  {
    lat: 51.3753,
    lng: 7.7025,
    q: "Woran erinnert das Mahnmal am Poth?",
    a: "B",
    l: "D",
    opt: {
      A: "An mittelalterliche Händler",
      B: "An die Opfer des Nationalsozialismus",
      C: "An den Wiederaufbau der Stadt"
    }
  },
  {
    lat: 51.3760,
    lng: 7.7032,
    q: "Wofür wurden Luftschutzstollen genutzt?",
    a: "B",
    l: "E",
    opt: {
      A: "Als Lager für Lebensmittel",
      B: "Als Schutzräume bei Bombenangriffen",
      C: "Als geheime Treffpunkte"
    }
  },
  {
    lat: 51.3765,
    lng: 7.7040,
    q: "Was sind Stolpersteine?",
    a: "B",
    l: "M",
    opt: {
      A: "Kunstwerke in Parks",
      B: "Kleine Gedenktafeln im Boden",
      C: "Pflastersteine ohne Bedeutung"
    }
  },
  {
    lat: 51.3770,
    lng: 7.7050,
    q: "Was geschah mit jüdischen Geschäften?",
    a: "A",
    l: "O",
    opt: {
      A: "Zerstört oder enteignet",
      B: "Gefördert",
      C: "Unverändert"
    }
  },
  {
    lat: 51.3775,
    lng: 7.7060,
    q: "Warum wurden Familien verfolgt?",
    a: "A",
    l: "K",
    opt: {
      A: "Religion und Herkunft",
      B: "Berufe",
      C: "Kleidung"
    }
  },
  {
    lat: 51.3780,
    lng: 7.7070,
    q: "Was erinnern Gedenktafeln?",
    a: "C",
    l: "R",
    opt: {
      A: "Künstler",
      B: "Sport",
      C: "Verfolgung und Widerstand"
    }
  },
  {
    lat: 51.3785,
    lng: 7.7080,
    q: "Was symbolisieren Stolpersteine?",
    a: "B",
    l: "A",
    opt: {
      A: "Städte",
      B: "Einzelschicksale",
      C: "Gebäude"
    }
  },
  {
    lat: 51.3790,
    lng: 7.7090,
    q: "Was passierte mit Synagogen?",
    a: "B",
    l: "T",
    opt: {
      A: "Erweitert",
      B: "Zerstört",
      C: "Museen"
    }
  },
  {
    lat: 51.3795,
    lng: 7.7100,
    q: "Warum erinnern wir an Menschen?",
    a: "A",
    l: "I",
    opt: {
      A: "Geschichte bleibt greifbar",
      B: "Namen sammeln",
      C: "Straßen füllen"
    }
  },
  {
    lat: 51.3800,
    lng: 7.7110,
    q: "Wichtige Lehre?",
    a: "B",
    l: "E",
    opt: {
      A: "Vergessen",
      B: "Demokratie schützen",
      C: "Vergangenheit leben"
    }
  }
];

function distance(a, b) {
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(a.lat * Math.PI / 180) *
    Math.cos(b.lat * Math.PI / 180) *
    Math.sin(dLng / 2) *
    Math.sin(dLng / 2);

  return Math.round(R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x)));
}

function angle(from, to) {
  const y = Math.sin((to.lng - from.lng) * Math.PI / 180) * Math.cos(to.lat * Math.PI / 180);
  const x =
    Math.cos(from.lat * Math.PI / 180) *
    Math.sin(to.lat * Math.PI / 180) -
    Math.sin(from.lat * Math.PI / 180) *
    Math.cos(to.lat * Math.PI / 180) *
    Math.cos((to.lng - from.lng) * Math.PI / 180);

  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function start() {
  navigator.geolocation.watchPosition(pos => {
    userPos = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };
    render();
  });

  window.addEventListener("deviceorientation", e => {
    if (e.alpha !== null) {
      heading = e.alpha;
      render();
    }
  });
}

function answer(i, val) {
  if (points[i].a === val) {
    points[i].done = true;
  }

  solution = points
    .filter(p => p.done)
    .map(p => p.l)
    .join("");

  render();
}

function render() {
  const next = points.find(p => !p.done);

  let rot = 0;
  if (userPos && next) {
    rot = angle(userPos, next) - heading;
  }

  let html = `
    <h1 style="text-align:center">Augen Auf Compass</h1>

    <button onclick="start()" style="width:100%;padding:10px;">
      Start GPS und Kompass
    </button>

    <div style="display:flex;justify-content:center;margin:20px;">
      <div style="width:140px;height:140px;border:3px solid gray;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <div style="width:4px;height:60px;background:red;transform:rotate(${rot}deg);transform-origin:bottom;"></div>
      </div>
    </div>

    <h2 style="text-align:center">Lösungswort: ${solution}</h2>
  `;

  points.forEach((p, i) => {
    const dist = userPos ? distance(userPos, p) : null;
    const near = dist && dist < 80;

    html += `
      <div style="background:#111827;padding:15px;margin:10px;">
        <strong>Station ${i + 1}</strong><br>
    `;

    if (dist) {
      html += "Entfernung: " + dist + " m<br>";
    }

    if (near && !p.done) {
      html += "<p>" + p.q + "</p>";

      for (let k in p.opt) {
        html += `
          <button onclick="answer(${i},'${k}')" style="display:block;margin-top:5px;">
            ${k}) ${p.opt[k]}
          </button>
        `;
      }
    }

    if (p.done) {
      html += "<div>gelöst: " + p.l + "</div>";
    }

    html += "</div>";
  });

  if (solution === "DEMOKRATIE") {
    html += "<h1 style='text-align:center'>Fertig</h1>";
  }

  document.getElementById("app").innerHTML = html;
}

render();
</script>

</body>
</html>
