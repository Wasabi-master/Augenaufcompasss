<script>
let userPos = null;
let heading = 0;
let solution = "";

const points = [
  {lat:51.3753,lng:7.7025,q:"Woran erinnert das Mahnmal am Poth?",a:"B",l:"D",done:false,opt:{A:"Händler",B:"NS-Opfer",C:"Wiederaufbau"}},
  {lat:51.3760,lng:7.7032,q:"Wofür wurden Luftschutzstollen genutzt?",a:"B",l:"E",done:false,opt:{A:"Lager",B:"Schutzräume",C:"Treffpunkte"}},
  {lat:51.3765,lng:7.7040,q:"Was sind Stolpersteine?",a:"B",l:"M",done:false,opt:{A:"Kunst",B:"Gedenktafeln",C:"Steine"}},
  {lat:51.3770,lng:7.7050,q:"Was geschah mit jüdischen Geschäften?",a:"A",l:"O",done:false,opt:{A:"Zerstört",B:"Gefördert",C:"Unverändert"}},
  {lat:51.3775,lng:7.7060,q:"Warum wurden Familien verfolgt?",a:"A",l:"K",done:false,opt:{A:"Religion",B:"Beruf",C:"Kleidung"}},
  {lat:51.3780,lng:7.7070,q:"Was erinnern Gedenktafeln?",a:"C",l:"R",done:false,opt:{A:"Künstler",B:"Sport",C:"Verfolgung"}},
  {lat:51.3785,lng:7.7080,q:"Was zeigen Stolpersteine?",a:"B",l:"A",done:false,opt:{A:"Städte",B:"Schicksale",C:"Gebäude"}},
  {lat:51.3790,lng:7.7090,q:"Was passierte mit Synagogen?",a:"B",l:"T",done:false,opt:{A:"Erweitert",B:"Zerstört",C:"Museen"}},
  {lat:51.3795,lng:7.7100,q:"Warum erinnern an Personen?",a:"A",l:"I",done:false,opt:{A:"Greifbar",B:"Sammeln",C:"Füllen"}},
  {lat:51.3800,lng:7.7110,q:"Wichtige Lehre?",a:"B",l:"E",done:false,opt:{A:"Vergessen",B:"Demokratie schützen",C:"Vergangenheit"}}
];

function requestPermissions(){
  // iPhone Sensor Permission
  if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission();
  }

  // Standort aktiv anfordern
  navigator.geolocation.getCurrentPosition(
    pos=>{
      userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      render();
    },
    err=>{
      alert("Bitte Standort erlauben!");
    }
  );

  navigator.geolocation.watchPosition(pos=>{
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    render();
  });
}

function distance(a,b){
  const R=6371000;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function angle(from,to){
  const y=Math.sin((to.lng-from.lng)*Math.PI/180)*Math.cos(to.lat*Math.PI/180);
  const x=Math.cos(from.lat*Math.PI/180)*Math.sin(to.lat*Math.PI/180)-
          Math.sin(from.lat*Math.PI/180)*Math.cos(to.lat*Math.PI/180)*Math.cos((to.lng-from.lng)*Math.PI/180);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// Kompass FIX (Android + iPhone)
window.addEventListener("deviceorientationabsolute",e=>{
  if(e.alpha!==null){ heading=e.alpha; render(); }
});

window.addEventListener("deviceorientation",e=>{
  if(e.alpha!==null){ heading=e.alpha; render(); }
});

function answer(i,val){
  if(points[i].a===val){
    points[i].done=true;
  }
  solution=points.filter(p=>p.done).map(p=>p.l).join("");
  render();
}

function render(){
  const next=points.find(p=>!p.done);
  let rot=0;
  if(userPos && next){
    rot=angle(userPos,next)-heading;
  }

  let html=`<h1 style="text-align:center">🧭 Augen Auf Compass</h1>
  <button onclick="requestPermissions()" style="margin-bottom:10px">📍 Start / Sensor aktivieren</button>`;

  html+=`<div style="display:flex;justify-content:center;margin:20px">
    <div style="width:150px;height:150px;border:4px solid gray;border-radius:50%;display:flex;align-items:center;justify-content:center">
      <div style="width:4px;height:60px;background:red;transform:rotate(${rot}deg);transform-origin:bottom"></div>
    </div>
  </div>`;

  html+=`<div style="text-align:center;margin-bottom:20px">Lösungswort: ${solution}</div>`;

  points.forEach((p,i)=>{
    const dist = userPos ? distance(userPos,p) : null;
    const near = dist && dist < 60;

    html+=`<div style="background:#111827;padding:15px;margin-bottom:10px;border-radius:10px">`;
    html+=`<div>Station ${i+1}</div>`;

    if(dist){
      html+=`<div style="color:lightblue">📏 ${dist} m entfernt</div>`;
    }

    if(!near){
      html+=`<div style="color:gray">📍 Geh näher ran (~60m)</div>`;
    }

    if(near && !p.done){
      html+=`<div>${p.q}</div>`;
      Object.entries(p.opt).forEach(([k,v])=>{
        html+=`<button onclick="answer(${i},'${k}')" style="display:block;margin-top:5px">${k}) ${v}</button>`;
      });
    }

    if(p.done){
      html+=`<div style="color:lightgreen">✔ ${p.l}</div>`;
    }

    html+=`</div>`;
  });

  if(solution==="DEMOKRATIE"){
    html+=`<h2 style="text-align:center;color:lightgreen">🎉 DEMOKRATIE 🎉</h2>`;
  }

  document.getElementById("app").innerHTML=html;
}

render();
</script>
