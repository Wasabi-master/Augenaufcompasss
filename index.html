<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Augen Auf Compass</title>
</head>

<body style="margin:0;background:#030712;color:white;font-family:Arial;">

<div id="app" style="padding:20px">Lade...</div>

<script>
let userPos = null;
let heading = 0;
let solution = "";
let lastVibration = null;

const points = [
  {lat:51.3753,lng:7.7025,q:"Mahnmal am Poth?",a:"B",l:"D",done:false,opt:{A:"Händler",B:"NS-Opfer",C:"Stadt"}},
  {lat:51.3760,lng:7.7032,q:"Luftschutzstollen?",a:"B",l:"E",done:false,opt:{A:"Lager",B:"Schutzräume",C:"Treff"}},
  {lat:51.3765,lng:7.7040,q:"Stolpersteine?",a:"B",l:"M",done:false,opt:{A:"Kunst",B:"Gedenktafeln",C:"Steine"}},
  {lat:51.3770,lng:7.7050,q:"Jüdische Geschäfte?",a:"A",l:"O",done:false,opt:{A:"Zerstört",B:"Gefördert",C:"Unverändert"}},
  {lat:51.3775,lng:7.7060,q:"Verfolgung?",a:"A",l:"K",done:false,opt:{A:"Religion",B:"Beruf",C:"Kleidung"}},
  {lat:51.3780,lng:7.7070,q:"Gedenktafeln?",a:"C",l:"R",done:false,opt:{A:"Künstler",B:"Sport",C:"Verfolgung"}},
  {lat:51.3785,lng:7.7080,q:"Stolpersteine zeigen?",a:"B",l:"A",done:false,opt:{A:"Städte",B:"Schicksale",C:"Gebäude"}},
  {lat:51.3790,lng:7.7090,q:"Synagogen?",a:"B",l:"T",done:false,opt:{A:"Erweitert",B:"Zerstört",C:"Museen"}},
  {lat:51.3795,lng:7.7100,q:"Erinnerung?",a:"A",l:"I",done:false,opt:{A:"Greifbar",B:"Sammeln",C:"Füllen"}},
  {lat:51.3800,lng:7.7110,q:"Lehre?",a:"B",l:"E",done:false,opt:{A:"Vergessen",B:"Demokratie schützen",C:"Vergangenheit"}}
];

function distance(a,b){
  const R=6371000;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a.lat*Math.PI/180)*
    Math.cos(b.lat*Math.PI/180)*
    Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function angle(from,to){
  const y=Math.sin((to.lng-from.lng)*Math.PI/180)*Math.cos(to.lat*Math.PI/180);
  const x=Math.cos(from.lat*Math.PI/180)*Math.sin(to.lat*Math.PI/180)-
    Math.sin(from.lat*Math.PI/180)*Math.cos(to.lat*Math.PI/180)*
    Math.cos((to.lng-from.lng)*Math.PI/180);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* iPhone + Android Fix */
async function start(){

  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {

    const res = await DeviceOrientationEvent.requestPermission();
    if (res !== "granted") {
      alert("Kompass nicht erlaubt");
      return;
    }
  }

  navigator.geolocation.watchPosition(pos=>{
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    render();
  });

  window.addEventListener("deviceorientation",e=>{
    if(e.alpha!==null){
      heading = e.webkitCompassHeading || e.alpha;
      render();
    }
  });
}

function vibrate(distance){
  if(!navigator.vibrate) return;

  if(distance < 50){
    const now = Date.now();
    if(!lastVibration || now - lastVibration > 3000){
      navigator.vibrate([100,50,100]);
      lastVibration = now;
    }
  }
}

function answer(i,val){
  if(points[i].a===val){
    points[i].done=true;
  }

  solution = points.filter(p=>p.done).map(p=>p.l).join("");
  render();
}

function render(){
  const next = points.find(p=>!p.done);

  let rot = 0;

  if(userPos && next){
    const dist = distance(userPos,next);
    vibrate(dist);
    rot = angle(userPos,next) - heading;
  }

  let html = `
    <h1 style="text-align:center">Augen Auf Compass</h1>

    <button onclick="start()" style="width:100%;padding:10px;">
      Start GPS & Kompass
    </button>

    <div style="display:flex;justify-content:center;margin:20px;">
      <div style="width:140px;height:140px;border:3px solid gray;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <div style="width:4px;height:60px;background:red;transform:rotate(${rot}deg);transform-origin:bottom;"></div>
      </div>
    </div>

    <h2 style="text-align:center">Lösungswort: ${solution}</h2>
  `;

  points.forEach((p,i)=>{
    const dist = userPos ? distance(userPos,p) : null;
    const near = dist && dist < 80;

    html += `
      <div style="background:#111827;padding:15px;margin:10px;">
        <b>Station ${i+1}</b><br>
    `;

    if(dist){
      html += "Entfernung: " + dist + " m<br>";
    }

    if(near && !p.done){
      html += "<p>"+p.q+"</p>";
      for(let k in p.opt){
        html += `<button onclick="answer(${i},'${k}')">${k}) ${p.opt[k]}</button><br>`;
      }
    }

    if(p.done){
      html += "gelöst: "+p.l;
    }

    html += "</div>";
  });

  if(solution==="DEMOKRATIE"){
    html += "<h1 style='text-align:center'>FERTIG</h1>";
  }

  document.getElementById("app").innerHTML = html;
}

render();
</script>

</body>
</html>
